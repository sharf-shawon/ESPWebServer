name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the details below.

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of ESP Web Deployer are you using?
      placeholder: "e.g., v1.0.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Frontend (Browser UI)
        - Backend (Build API)
        - Firmware (ESP code)
        - Docker/Deployment
        - Web Serial / Flashing
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of what happened vs what you expected
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Select board 'NodeMCU'
        2. Paste HTML content
        3. Click 'Build Firmware'
        4. See error...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: Ubuntu 22.04
        - Browser: Chrome 128
        - Board: NodeMCU v2
        - Docker: 24.0
