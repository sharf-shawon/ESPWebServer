[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
lib_deps =
    tzapu/WiFiManager@^0.16.0
    me-no-dev/ESPAsyncTCP@^1.2.2
    me-no-dev/ESPAsyncWebServer@^1.2.3
build_flags =
    -D BOARD_ESP8266
    -D CONFIG_LITTLEFS_SPIFFS_COMPAT=1

